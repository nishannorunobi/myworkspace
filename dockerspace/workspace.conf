#!/bin/bash
# workspace.conf — single config for the entire workspace.
# Sourced by host scripts (start_project_container.sh, stop_project_container.sh) and container scripts (via functions.sh).

# ─── Docker ───────────────────────────────────────────────────────────────────

IMAGE_NAME="${PROJECT_NAME}-image"
IMAGE_VERSION="1.3"          # bump this to force a fresh build with new libraries
CONTAINER_NAME="${PROJECT_NAME}-container"

# ─── Directory names ──────────────────────────────────────────────────────────

CONTAINER_WORKDIR="/myworkspace"   # mount point inside the container (also the WORKDIR)
PROJECTSPACE_DIR="projectspace"      # subfolder where project repos are cloned (gitignored)
MOUNTSPACE_DIR="mountspace"          # subfolder for local files never committed (gitignored)

# Which environment to start: dev | test | prod
CONTAINER_TYPE="dev"

REMOVE_IMAGE_ON_STOP=false        # keep versioned image so next start_project_container.sh skips the build
FORCE_RECREATE_CONTAINER=false    # false = reuse existing container (preserves installed packages); true = destroy and recreate every run


# ─── VS Code ──────────────────────────────────────────────────────────────────

# true  — copies .vscode/settings.json from host into the container on start
# false — skip, use default VS Code settings inside the container
COPY_VSCODE_SETTINGS=false
CLEAN_VSCODE_CACHE_ON_STOP=false

# Shared Docker CLI plugins dir — relative to workspace root, mounted into the container.
# Host ~/.docker/cli-plugins and each container user's ~/.docker/cli-plugins are symlinked here.
DOCKER_PLUGINS_DIR=".vscode/docker-plugins"

# true  — copies host ~/.vscode/extensions/ into .vscode/vscode-server-extensions/ on start.
#          Each container user's ~/.vscode-server/extensions/ is symlinked there.
# false — skip; install extensions manually inside the container.
COPY_VSCODE_EXTENSIONS=true
VSCODE_EXTENSIONS_DIR=".vscode/vscode-server-extensions"

# ─── OS image ─────────────────────────────────────────────────────────────────

# Base OS — switch here when changing distro. Examples:
#   ubuntu:24.04  ubuntu:22.04  debian:bookworm  almalinux:9  fedora:40
BASE_IMAGE="almalinux:9"

# ─── Package manager ──────────────────────────────────────────────────────────

# Options: apt | yum | dnf | apk  (must match BASE_IMAGE above)
PKG_MANAGER="dnf"

# ─── SSH ──────────────────────────────────────────────────────────────────────

# true  — copies host ~/.ssh/id_ed25519 into each user's ~/.ssh (reuses existing GitHub access)
# false — generates a new ed25519 keypair inside the container (must add public key to GitHub)
COPY_SSH_FROM_HOST=true

# ─── Package names and versions ───────────────────────────────────────────────

# Package names differ between distros — set the correct name for your base OS.
# AlmaLinux/RHEL: gcc gcc-c++ make   |   Ubuntu/Debian: build-essential
# AlmaLinux/RHEL: openssh-clients    |   Ubuntu/Debian: openssh-client
GIT_PKG="git"
BUILD_TOOLS_PKGS="gcc gcc-c++ make"
CURL_PKG="curl"
WGET_PKG="wget"
VIM_PKG="vim"
UNZIP_PKG="unzip"
SSH_CLIENT_PKG="openssh-clients"

# Set to "latest" or pin an exact version e.g. "14.3.0"
GIT_VERSION="latest"
BUILD_TOOLS_VERSION="latest"
CURL_VERSION="latest"
WGET_VERSION="latest"
VIM_VERSION="latest"
UNZIP_VERSION="latest"
SSH_CLIENT_VERSION="latest"

# ─── Claude Code CLI ──────────────────────────────────────────────────────────
# See claude/claude.conf for Claude-specific settings.

# ─── Project ──────────────────────────────────────────────────────────────────
# See project.conf for project-specific settings (git clone URL, tool versions).
