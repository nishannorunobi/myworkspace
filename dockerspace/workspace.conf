#!/bin/bash
# workspace.conf — single config for the entire workspace.
# Sourced by host scripts (start.sh, stop.sh) and container scripts (via functions.sh).

# ─── Docker ───────────────────────────────────────────────────────────────────

IMAGE_NAME="mydockerspace-image"
CONTAINER_NAME="mydockerspace-container"
RESOURCES_DIR="$(pwd)/git-ignore-resources"

# Which environment to start: dev | test | prod
CONTAINER_TYPE="dev"

REMOVE_IMAGE_ON_STOP=true
CLEAN_VSCODE_CACHE_ON_STOP=true

# ─── VS Code ──────────────────────────────────────────────────────────────────

# true  — copies .vscode/settings.json from host into the container on start
# false — skip, use default VS Code settings inside the container
COPY_VSCODE_SETTINGS=true

# ─── Package manager ──────────────────────────────────────────────────────────

# Options: apt | yum | dnf | apk  (must match the base image)
PKG_MANAGER="apt"

# ─── Git identity ─────────────────────────────────────────────────────────────

GIT_USER_NAME="Nishan"
GIT_USER_EMAIL="norunnabinishan@gmail.com"

# ─── SSH ──────────────────────────────────────────────────────────────────────

# true  — copies host ~/.ssh/id_ed25519 into each user's ~/.ssh (reuses existing GitHub access)
# false — generates a new ed25519 keypair inside the container (must add public key to GitHub)
COPY_SSH_FROM_HOST=true

# ─── Package versions ─────────────────────────────────────────────────────────

# Set to "latest" or pin an exact version e.g. "1:8.4p1-5"
GIT_VERSION="latest"
BUILD_ESSENTIAL_VERSION="latest"
CURL_VERSION="latest"
WGET_VERSION="latest"
VIM_VERSION="latest"
UNZIP_VERSION="latest"
OPENSSH_CLIENT_VERSION="latest"

# ─── Claude Code CLI ──────────────────────────────────────────────────────────

# true  — installs Node.js and @anthropic-ai/claude-code inside the container
# false — skip
INSTALL_CLAUDE_CLI=true
NODE_VERSION="latest"

# ─── Project-specific tools — uncomment and set as needed ─────────────────────

# PYTHON_VERSION="3.10"
# FFMPEG_VERSION="latest"
